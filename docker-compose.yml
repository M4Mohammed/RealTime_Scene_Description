# ============================================================================
# VisionAssist — Docker Compose (GCP Compute Engine with GPU)
# ============================================================================
# Usage:
#   docker compose up -d --build
#   docker compose logs -f
#   docker compose down
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Web App — FastAPI backend + static frontend (no GPU needed)
  # --------------------------------------------------------------------------
  web-app:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: visionassist-web
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - MODEL_SERVER_URL=http://model-server:8080
    depends_on:
      model-server:
        condition: service_healthy
    networks:
      - visionassist-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------------------------
  # Model Server — BLIP inference on GPU
  # --------------------------------------------------------------------------
  model-server:
    build:
      context: .
      dockerfile: Dockerfile.model
    container_name: visionassist-model
    env_file:
      - path: .env
        required: false
    environment:
      - MODEL_NAME=Salesforce/blip-image-captioning-base
      - MAX_NEW_TOKENS=50
    networks:
      - visionassist-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  visionassist-net:
    driver: bridge
